global:
  resolve_timeout: 5m

route:
  receiver: default-null
  group_by:
    - alertname
    - job
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical-webhook
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: default-webhook
      repeat_interval: 4h

receivers:
  - name: default-null

  - name: default-webhook
    webhook_configs:
      - url: "http://placeholder-webhook:5000/alert"
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: critical-webhook
    webhook_configs:
      - url: "http://placeholder-webhook:5000/critical-alert"
        send_resolved: true
        http_config:
          follow_redirects: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - job
