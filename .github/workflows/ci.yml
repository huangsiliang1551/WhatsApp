name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Python syntax check
        run: python -m py_compile app/main.py

      - name: Import check
        run: >-
          python -c "from app.main import app; print(f'FastAPI app loaded: {app.title}')"

  backend-tests:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Verify core backend test collection
        run: python scripts/ci_collect_core_tests.py

      - name: Run backend test suite
        run: python -m pytest tests tests/api tests/services -q --timeout=60

  backend-postgres-concurrency:
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: whatsapp_user
          POSTGRES_PASSWORD: secure_password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U whatsapp_user -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      H5_POSTGRES_TEST_DSN: postgresql://whatsapp_user:secure_password@127.0.0.1:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Warm PostgreSQL admin connection
        run: |
          python - <<'PY'
          import os
          import time
          from uuid import uuid4
          import psycopg

          dsn = os.environ["H5_POSTGRES_TEST_DSN"]
          last_error = None
          for attempt in range(1, 16):
              scratch_db = f"codex_probe_{uuid4().hex[:8]}"
              try:
                  with psycopg.connect(dsn, connect_timeout=2, autocommit=True) as conn:
                      with conn.cursor() as cur:
                          cur.execute("SELECT 1")
                          cur.execute(f'CREATE DATABASE "{scratch_db}"')
                          cur.execute(
                              "SELECT pg_terminate_backend(pid) FROM pg_stat_activity "
                              "WHERE datname = %s AND pid <> pg_backend_pid()",
                              (scratch_db,),
                          )
                          cur.execute(f'DROP DATABASE IF EXISTS "{scratch_db}"')
                  print(f"postgres warmup passed on attempt {attempt}")
                  break
              except Exception as exc:
                  last_error = exc
                  print(f"postgres warmup attempt {attempt} failed: {exc}")
                  time.sleep(2)
          else:
              raise SystemExit(f"postgres warmup failed: {last_error}")
          PY

      - name: Run PostgreSQL concurrency tests
        run: python -m pytest tests/test_h5_task_packages_wallet_postgres.py -q

  frontend-and-config:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate Prometheus rules
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "$PWD/monitoring/prometheus/alerts.yml:/alerts.yml:ro" \
            prom/prometheus:v2.54.1 \
            check rules /alerts.yml

      - name: Validate Alertmanager config
        run: |
          docker run --rm \
            --entrypoint amtool \
            -v "$PWD/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro" \
            prom/alertmanager:v0.28.1 \
            check-config /etc/alertmanager/alertmanager.yml

      - name: Validate Grafana dashboard JSON
        shell: pwsh
        run: |
          Get-Content -Path "monitoring/grafana/dashboards/whatsapp-platform-overview.json" -Raw |
            ConvertFrom-Json | Out-Null

      - name: Validate Docker Compose
        run: docker compose config > /tmp/docker-compose.resolved.yml

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $tokens = $null; $errors = $null
          $files = @(
            "scripts/backup-postgres.ps1",
            "scripts/restore-postgres.ps1",
            "scripts/check-launch-readiness.ps1",
            "scripts/backup-redis.ps1"
          )
          foreach ($f in $files) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($f, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              throw ($errors | ForEach-Object { $_.Message } | Out-String)
            }
          }

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build app

      - name: Verify container starts
        run: |
          docker compose up -d app
          sleep 10
          docker compose exec app python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"
          docker compose down
