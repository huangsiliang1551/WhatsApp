name: Deploy H5 Sites

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "app/**"
      - "Dockerfile"
      - "docker-compose.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck Frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Verify Core Backend Test Collection
        run: python scripts/ci_collect_core_tests.py

      - name: Check Production Readiness
        run: python scripts/check_production_readiness.py

      - name: Run Backend Tests
        run: python -m pytest tests tests/api tests/services -x -q --timeout=60

      - name: Resolve Deploy Mode
        if: github.ref == 'refs/heads/main'
        id: deploy_mode
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          if [ -z "${SSH_PRIVATE_KEY}" ] || [ -z "${SERVER_HOST}" ] || [ -z "${SERVER_USER}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Remote deploy secrets are missing; keeping workflow in dry-run mode."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Production Server
        if: github.ref == 'refs/heads/main' && steps.deploy_mode.outputs.enabled == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_FRONTEND_PATH: ${{ secrets.SERVER_FRONTEND_PATH || '/var/www/default' }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR || '/opt/whatsapp' }}
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/deploy_key"

          echo "::group::Upload Frontend Build"
          echo "Uploading to ${SERVER_USER}@${SERVER_HOST}:${SERVER_FRONTEND_PATH}"
          rsync -e "ssh ${SSH_OPTS}" -avz --delete --checksum \
            frontend/dist/ \
            "${SERVER_USER}@${SERVER_HOST}:${SERVER_FRONTEND_PATH}/"
          echo "::endgroup::"

          echo "::group::Restart Backend Services"
          ssh ${SSH_OPTS} "${SERVER_USER}@${SERVER_HOST}" \
            "cd ${SERVER_APP_DIR} && docker compose pull app worker && docker compose up -d --force-recreate app worker"
          echo "::endgroup::"

          echo "::group::Health Check"
          sleep 15
          ssh ${SSH_OPTS} "${SERVER_USER}@${SERVER_HOST}" \
            "curl -s -o /dev/null -w 'HTTP %{http_code}' --max-time 10 http://127.0.0.1:8000/health"
          echo ""
          echo "::endgroup::"

          echo "Deployment completed successfully"

      - name: Skip Remote Deploy Dry Run
        if: github.ref == 'refs/heads/main' && steps.deploy_mode.outputs.enabled != 'true'
        run: echo "Remote deploy secrets are missing; skipping production SSH deployment."
